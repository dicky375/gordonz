<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shemen Oil Experience - Add Your Photo</title>
    <style >
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        h1 {
            color: #1a1a1a;
            text-align: center;
        }
        .container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            max-width: 600px;
            width: 100%;
            text-align: center;
        }
             button {
            background-color: #d4af37; /* Gold color matching the flyer */
            color: #000;
            border: none;
            padding: 15px 30px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #b5952f;
        }
        button:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }
        input[type="file"] {
            margin: 20px 0;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            width: 80%;
        }
        canvas {
            max-width: 100%;
            height: auto;
            border: 1px solid #ddd;
            border-radius: 5px;
            margin-bottom: 20px;
        }
       @media (max-width: 600px) {
        canvas {
            max-height:  65vh;
        }
       }
    </style>
</head>
<body>

    <div class="container">
        <h1>Join the Shemen Experience</h1>
        <p>Upload your picture below to generate your personalized flyer.</p>
        <input type="file" id="imageLoader" accept="image/*" />
        
        <!-- The canvas where the images are merged -->
        <canvas id="imageCanvas"></canvas>
        
        <br>
        <button id="downloadBtn" disabled>Download Your Flyer</button>
    </div>

    <script src="script.js">
       

    </script>
</body>
</html>
